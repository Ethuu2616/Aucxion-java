spring.application.name=aucxion-backend
server.port=8080

# Credentials are read from environment variables — never hardcoded here
# For local dev: set these in your shell or create a .env file
# For Docker: docker-compose.yml injects them automatically
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/aucxion_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.web.cors.allowed-origins=http://localhost:3000
