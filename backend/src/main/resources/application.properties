spring.application.name=aucxion-backend
server.port=8080

# ── Database ──────────────────────────────────────────────────────────────────
# All credentials come from environment variables (set in .env or system env)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/aucxion_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Schema init — Spring Boot runs schema.sql on startup ─────────────────────
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# ── Static frontend — served from /static inside the jar ─────────────────────
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# ── CORS (only needed for local dev with npm start) ───────────────────────────
spring.web.cors.allowed-origins=http://localhost:3000
